<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Пыльца Контроль</title>
    
    <!-- Подключение библиотек -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            /* Apple Dark Theme Colors */
            --bg-color: #000000;
            --surface-color: rgba(28, 28, 30, 0.65);
            --surface-solid: #1C1C1E;
            --text-main: #FFFFFF;
            --text-secondary: #EBEBF599;
            --accent: #0A84FF;
            
            /* Risk Colors */
            --safe: #32D74B;
            --warning: #FFD60A;
            --high: #FF9F0A;
            --critical: #FF453A;
            --burgundy: #8A0303;

            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden; /* Prevent body scroll, handle inside containers */
        }

        /* Hide scrollbars for clean UI */
        ::-webkit-scrollbar {
            display: none;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; /* Dynamic viewport height for mobile browsers */
        }

        /* Header & Navigation */
        .header {
            padding: max(50px, env(safe-area-inset-top)) 20px 15px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            border-bottom: 0.5px solid var(--glass-border);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: nowrap; /* Строго одна строка */
            gap: 5px; /* Минимальный зазор */
            white-space: nowrap;
        }

        .app-title {
            font-size: clamp(18px, 5.5vw, 24px); /* Резиновый размер */
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.5px;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .segment-control {
            display: flex;
            background: var(--surface-solid);
            border-radius: 9px;
            padding: 2px;
            position: relative;
        }

        .segment-btn {
            flex: 1;
            padding: 8px 0;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            border: none;
            background: transparent;
            z-index: 2;
            cursor: pointer;
            transition: color 0.3s;
        }

        .segment-btn.active {
            color: var(--text-main);
        }

        .segment-indicator {
            position: absolute;
            top: 2px;
            bottom: 2px;
            width: calc(50% - 2px);
            background: #636366;
            border-radius: 7px;
            z-index: 1;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Swiper Container */
        .views-wrapper {
            flex: 1;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            padding-bottom: 90px; /* Space for download button */
        }

        .view-pane {
            min-width: 100vw;
            width: 100vw;
            scroll-snap-align: start;
            padding: 20px;
            overflow-y: auto;
        }

        /* Glassmorphism Cards */
        .card {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
        }

        /* Dashboard specific */
        .risk-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .risk-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Pollen Items */
        .pollen-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .pollen-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
        }

        .pollen-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pollen-icon-wrapper {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .pollen-name {
            font-size: 16px;
            font-weight: 600;
        }

        .pollen-value {
            font-size: 20px;
            font-weight: 700;
            text-align: right;
        }

        .pollen-trend {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-end;
        }

        /* Insights */
        .insight-item {
            border-bottom: 0.5px solid var(--glass-border);
            padding: 15px 0;
        }
        
        .insight-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .insight-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .insight-author {
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .insight-date {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .insight-text {
            font-size: 14px;
            line-height: 1.4;
            color: var(--text-secondary);
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Charts */
        .chart-container {
            position: relative;
            height: 200px;
            width: 100%;
        }

        /* Floating Button */
        .floating-action {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 16px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            z-index: 200;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .floating-action:active {
            transform: translateX(-50%) scale(0.95);
        }

        /* Summary Table */
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .summary-table th {
            text-align: left;
            padding-bottom: 10px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .summary-table td {
            padding: 12px 0;
            border-top: 0.5px solid var(--glass-border);
        }
        
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        
        .empty-state {
            text-align: center;
            padding: 30px 10px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Погода в шапке и анимации */
        .date-text {
            color: var(--text-secondary);
            font-size: clamp(10px, 3vw, 14px);
            font-weight: 500;
        }

        .header-weather {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: clamp(4px, 1.5vw, 10px);
            font-size: clamp(10px, 3vw, 13px);
            font-weight: 600;
            white-space: nowrap;
            margin-left: auto;
        }

        .weather-stat-mini {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        @keyframes anim-temp {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        @keyframes anim-wind {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(2px) rotate(5deg); }
        }
        @keyframes anim-drop {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-2px) scale(0.95); }
        }

        .icon-temp { animation: anim-temp 3s infinite ease-in-out; color: var(--critical); }
        .icon-wind { animation: anim-wind 2.5s infinite ease-in-out; color: var(--safe); }
        .icon-drop { animation: anim-drop 2s infinite ease-in-out; color: var(--accent); }

        /* Экран входа (Login Screen) */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }

        .login-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .login-card {
            background: var(--surface-color);
            border: 0.5px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px 20px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .password-input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 24px;
            text-align: center;
            margin: 25px 0 5px;
            outline: none;
            letter-spacing: 10px;
            transition: border-color 0.2s;
        }

        .password-input:focus {
            border-color: var(--accent);
        }

        .login-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .login-btn:active {
            transform: scale(0.95);
            background: #0071e3;
        }

        .error-text {
            color: var(--critical);
            font-size: 13px;
            min-height: 18px;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .error-text.show {
            opacity: 1;
        }

        /* Анимация при неверном пароле */
        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        /* АДАПТАЦИЯ ПОД ГОРИЗОНТАЛЬНЫЙ РЕЖИМ (Landscape) */
        @media (orientation: landscape) and (max-height: 600px) {
            .header {
                padding: max(15px, env(safe-area-inset-top)) 20px 10px; /* Убираем огромный отступ */
            }
            .header-top {
                margin-bottom: 10px;
            }
            .app-title {
                font-size: 18px; /* Уменьшаем заголовок */
            }
            .card {
                padding: 15px; /* Компактные карточки */
                margin-bottom: 10px;
            }
            .chart-container {
                height: 160px; /* Компактный график */
            }
            .views-wrapper {
                padding-bottom: 20px; /* Убираем пустоту внизу */
            }
            /* Кнопка сохранения становится иконкой справа снизу */
            .floating-action {
                bottom: 15px;
                right: max(15px, env(safe-area-inset-right));
                left: auto;
                transform: none;
                width: 48px;
                height: 48px;
                padding: 0;
                border-radius: 50%;
            }
            .floating-action span {
                display: none; /* Прячем текст */
            }
            .floating-action:active {
                transform: scale(0.9); /* Исправленная анимация нажатия для сбоку */
            }
        }

    </style>
</head>
<body>

    <!-- Приветственный экран с паролем -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-card" id="login-card">
            <i data-lucide="shield-check" size="56" style="color: var(--accent); margin-bottom: 15px;"></i>
            <h2 style="font-size: 24px; margin-bottom: 8px;">Доступ закрыт</h2>
            <p style="font-size: 14px; color: var(--text-secondary);">Введите пароль для просмотра данных</p>
            
            <input type="password" id="pwd-input" class="password-input" placeholder="••••••" inputmode="numeric" maxlength="6">
            <div id="login-error" class="error-text">Извините, неверный пароль 😔</div>
            
            <button class="login-btn" onclick="checkPassword()">Войти</button>
        </div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-top">
                <h1 class="app-title">Москва <span class="date-text" id="current-date"></span></h1>
                
                <!-- Автоматическая погода -->
                <div class="header-weather" id="live-weather">
                    <div class="weather-stat-mini"><i data-lucide="thermometer" size="16" class="icon-temp"></i><span id="w-temp">--</span></div>
                    <div class="weather-stat-mini"><i data-lucide="wind" size="16" class="icon-wind"></i><span id="w-wind">--</span></div>
                    <div class="weather-stat-mini"><i data-lucide="droplet" size="16" class="icon-drop"></i><span id="w-hum">--</span></div>
                </div>
            </div>
            
            <div class="segment-control">
                <div class="segment-indicator" id="segment-indicator"></div>
                <button class="segment-btn active" onclick="switchTab(0)">СЕГОДНЯ</button>
                <button class="segment-btn" onclick="switchTab(1)">АРХИВ</button>
            </div>
        </header>

        <!-- Main Content (Swipeable) -->
        <div class="views-wrapper" id="views-wrapper" onscroll="handleScroll()">
            
            <!-- VIEW 1: TODAY -->
            <div class="view-pane" id="view-today">
                
                <!-- Уведомление об отсутствии данных (по умолчанию скрыто) -->
                <div id="no-data-msg" style="display: none; text-align: center; color: var(--text-secondary); margin-top: 10px; margin-bottom: 40px; font-size: 16px;">
                    Данных с ловушек за сегодня пока нет 🤷‍♂️
                </div>

                <!-- Объединенная карточка: Заголовок с бейджем и данные ловушек -->
                <div class="card">
                    <div class="risk-header" style="margin-bottom: 15px;">
                        <h3 class="section-title" style="margin-bottom: 0;"><i data-lucide="microscope" size="18"></i> Данные ловушек</h3>
                        <div class="risk-badge" id="main-risk-badge" style="background: rgba(255, 159, 10, 0.2); color: var(--high);">
                            ВЫСОКИЙ
                        </div>
                    </div>
                    <div class="pollen-list" id="pollen-list">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div class="card">
                    <h3 class="section-title"><i data-lucide="trending-up" size="18"></i> Динамика (5 дней)</h3>
                    <div class="chart-container">
                        <canvas id="todayChart"></canvas>
                    </div>
                </div>

                <div class="card">
                    <h3 class="section-title"><i data-lucide="message-circle" size="18"></i> Инсайты аллергиков</h3>
                    <div id="insights-list">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <!-- VIEW 2: ARCHIVE -->
            <div class="view-pane" id="view-archive">

                <div class="card">
                    <h3 class="section-title"><i data-lucide="bar-chart-2" size="18"></i> Сравнение сезонов</h3>
                    <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 15px;">Максимальные концентрации Березы (ед/м³)</p>
                    <div class="chart-container">
                        <canvas id="archiveChart"></canvas>
                    </div>
                </div>

                <div class="card">
                    <h3 class="section-title"><i data-lucide="calendar" size="18"></i> Сводка 2023-2026</h3>
                    <table class="summary-table" id="summary-table">
                        <!-- Populated by JS -->
                    </table>
                </div>

            </div>
        </div>

        <!-- Floating Action Button -->
        <button class="floating-action" onclick="downloadApp()">
            <i data-lucide="download" size="20" id="dl-icon"></i> <span id="dl-text">Сохранить 앱</span>
        </button>
    </div>

    <script>
        // --- 1. Внутренняя База Данных (Hardcoded JSON) ---
        const db = {
            metadata: {
                location: "Москва",
                lastUpdated: "17 Марта 2026"
            },
            today: {
                hasDataToday: true, // Измените на false, чтобы протестировать интерфейс без данных
                overallRisk: "high", // safe, warning, high, critical
                allergens: [
                    { 
                        id: "alder", 
                        name: "Ольха", 
                        value: 220, 
                        level: "high", // CSS var mapping
                        trend: "up", // up, down, flat
                        icon: "leaf"
                    },
                    { 
                        id: "hazel", 
                        name: "Орешник", 
                        value: 16, 
                        level: "warning", 
                        trend: "down",
                        icon: "tree-deciduous"
                    },
                    { 
                        id: "birch", 
                        name: "Береза", 
                        value: 0, 
                        level: "safe", 
                        trend: "flat",
                        icon: "tree-pine"
                    }
                ]
            },
            insights: [
                {
                    author: "Дмитрий, СЗАО",
                    text: "Ольха 220 сегодня, накрыло капитально. В прошлом году старт был немного другим. Ждем дождей.",
                    time: "Сегодня, 11:20",
                    verified: true
                },
                {
                    author: "Елена, ЗАО",
                    text: "По графику лещина всего 16, но по ощущениям все 100. В Филевском парке уже лучше не гулять без маски.",
                    time: "Сегодня, 09:45",
                    verified: true
                },
                {
                    author: "Ольга, ЮВАО",
                    text: "Березы пока нет, слава богу. Но помня прошлогодний ад весной 2025-го (свыше 14000 ед), заранее закупилась таблетками.",
                    time: "Вчера, 21:10",
                    verified: false
                }
            ],
            charts: {
                today: {
                    labels: ["13 Мар", "14 Мар", "15 Мар", "16 Мар", "17 Мар"],
                    datasets: [
                        { label: 'Ольха', data: [39, 0, 0, 264, 220], color: '#FF9F0A' },
                        { label: 'Орешник', data: [44, 0, 0, 25, 16], color: '#FFD60A' },
                        { label: 'Береза', data: [0, 0, 0, 0, 0], color: '#32D74B' }
                    ]
                },
                archive: {
                    labels: ["20 Апр", "21 Апр", "22 Апр", "23 Апр", "24 Апр", "27 Апр"],
                    datasets: [
                        { label: 'Береза (факт 2025)', data: [14403, 8310, 1203, 3968, 1700, 389], color: '#FF453A' },
                        { label: 'Береза (факт 2023)', data: [4186, 11206, 6000, 5000, 9092, 935], color: '#32D74B' }
                    ]
                }
            },
            summary: [
                { year: 2026, status: "Март: Ольха активна (220)", level: "high" },
                { year: 2025, status: "Пик березы 20 апр (14403)", level: "critical" },
                { year: 2024, status: "Умеренный фон", level: "warning" },
                { year: 2023, status: "Пик березы 21 апр (11206)", level: "critical" }
            ]
        };

        // --- 2. Цветовые маппинги ---
        const colorMap = {
            'safe': 'var(--safe)',
            'warning': 'var(--warning)',
            'high': 'var(--high)',
            'critical': 'var(--critical)',
            'burgundy': 'var(--burgundy)'
        };

        const bgAlphaMap = {
            'safe': 'rgba(50, 215, 75, 0.15)',
            'warning': 'rgba(255, 214, 10, 0.15)',
            'high': 'rgba(255, 159, 10, 0.15)',
            'critical': 'rgba(255, 69, 58, 0.15)',
            'burgundy': 'rgba(138, 3, 3, 0.15)'
        };

        const iconTrendMap = {
            'up': '<i data-lucide="trending-up" size="14"></i> Рост',
            'down': '<i data-lucide="trending-down" size="14"></i> Спад',
            'flat': '<i data-lucide="minus" size="14"></i> Нет данных'
        };

        // --- 3. Инициализация UI ---
        document.addEventListener("DOMContentLoaded", () => {
            updateDate();
            fetchWeather();
            
            renderTodayData();
            renderInsights();
            renderSummaryTable();
            
            initCharts();
            lucide.createIcons(); // Initialize all icons

            // Вход по нажатию Enter
            document.getElementById('pwd-input').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    checkPassword();
                }
            });
        });

        // --- Логика авторизации ---
        function checkPassword() {
            const input = document.getElementById('pwd-input').value;
            const errorText = document.getElementById('login-error');
            const card = document.getElementById('login-card');
            
            if (input === '885522') {
                // Успешный вход: скрываем окно
                document.getElementById('login-overlay').classList.add('hidden');
                setTimeout(() => {
                    document.getElementById('login-overlay').style.display = 'none';
                }, 400);
            } else {
                // Неверный пароль: показываем текст и запускаем анимацию
                errorText.classList.add('show');
                card.classList.add('shake');
                document.getElementById('pwd-input').value = '';
                
                // Удаляем класс анимации после её завершения, чтобы можно было трясти снова
                setTimeout(() => {
                    card.classList.remove('shake');
                }, 400);
            }
        }

        function renderTodayData() {
            const list = document.getElementById('pollen-list');
            const noDataMsg = document.getElementById('no-data-msg');
            const badge = document.getElementById('main-risk-badge');
            
            const riskLabels = {
                'safe': 'БЕЗОПАСНО',
                'warning': 'СРЕДНИЙ',
                'high': 'ВЫСОКИЙ',
                'critical': 'КРИТИЧЕСКИЙ',
                'burgundy': 'ЭКСТРЕМАЛЬНЫЙ'
            };

            if (!db.today.hasDataToday) {
                noDataMsg.style.display = 'block';
                list.innerHTML = '<div class="empty-state">Ожидаем обновления данных...</div>';
                badge.innerText = 'НЕТ ДАННЫХ';
                badge.style.background = 'rgba(255, 255, 255, 0.1)';
                badge.style.color = 'var(--text-secondary)';
                return;
            }

            noDataMsg.style.display = 'none';
            
            // Динамическое обновление бейджа на основе db.today.overallRisk
            badge.innerText = riskLabels[db.today.overallRisk] || 'ВЫСОКИЙ';
            badge.style.background = bgAlphaMap[db.today.overallRisk] || 'rgba(255, 159, 10, 0.2)';
            badge.style.color = colorMap[db.today.overallRisk] || 'var(--high)';

            let html = '';

            db.today.allergens.forEach(item => {
                const color = colorMap[item.level];
                const bg = bgAlphaMap[item.level];
                
                html += `
                <div class="pollen-item">
                    <div class="pollen-left">
                        <div class="pollen-icon-wrapper" style="background: ${bg}; color: ${color};">
                            <i data-lucide="${item.icon}" size="20"></i>
                        </div>
                        <div class="pollen-name">${item.name}</div>
                    </div>
                    <div>
                        <div class="pollen-value" style="color: ${color};">${item.value} <span style="font-size:12px; color:var(--text-secondary); font-weight:normal;">ед/м³</span></div>
                        <div class="pollen-trend">${iconTrendMap[item.trend]}</div>
                    </div>
                </div>`;
            });
            list.innerHTML = html;
        }

        function renderInsights() {
            const list = document.getElementById('insights-list');
            if(db.insights.length === 0) {
                list.innerHTML = `<div class="empty-state">Нет новых данных за сегодня</div>`;
                return;
            }

            let html = '';
            db.insights.forEach(item => {
                const verifiedIcon = item.verified ? '<i data-lucide="badge-check" size="14" style="color: var(--accent);"></i>' : '';
                html += `
                <div class="insight-item">
                    <div class="insight-header">
                        <div class="insight-author">${item.author} ${verifiedIcon}</div>
                        <div class="insight-date">${item.time}</div>
                    </div>
                    <div class="insight-text">${item.text}</div>
                </div>`;
            });
            list.innerHTML = html;
        }

        function renderSummaryTable() {
            const table = document.getElementById('summary-table');
            let html = `<tr><th>Год</th><th>Статус / Пик</th></tr>`;
            
            db.summary.forEach(row => {
                html += `
                <tr>
                    <td style="font-weight: 600;">${row.year}</td>
                    <td>
                        <span class="status-dot" style="background-color: ${colorMap[row.level]};"></span>
                        ${row.status}
                    </td>
                </tr>`;
            });
            table.innerHTML = html;
        }

        // --- 4. Навигация и Свайпы ---
        const wrapper = document.getElementById('views-wrapper');
        const indicator = document.getElementById('segment-indicator');
        const btns = document.querySelectorAll('.segment-btn');

        function switchTab(index) {
            const viewWidth = window.innerWidth;
            wrapper.scrollTo({ left: index * viewWidth, behavior: 'smooth' });
            updateTabsUI(index);
        }

        function handleScroll() {
            const scrollLeft = wrapper.scrollLeft;
            const viewWidth = window.innerWidth;
            // Calculate which tab is mostly in view
            const index = Math.round(scrollLeft / viewWidth);
            updateTabsUI(index);
        }

        function updateTabsUI(index) {
            btns.forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            indicator.style.transform = `translateX(${index * 100}%)`;
        }

        // --- Интеграция погоды (Open-Meteo API) ---
        async function fetchWeather() {
            try {
                // Координаты Москвы
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.7558&longitude=37.6173&current=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m&wind_speed_unit=ms');
                const data = await res.json();
                
                const temp = data.current.temperature_2m;
                const hum = data.current.relative_humidity_2m;
                const windSpeed = data.current.wind_speed_10m;
                const windDir = data.current.wind_direction_10m;
                
                // Конвертация градусов в направление ветра
                const dirs = ['С', 'СВ', 'В', 'ЮВ', 'Ю', 'ЮЗ', 'З', 'СЗ'];
                const dirStr = dirs[Math.round(windDir / 45) % 8];
                
                document.getElementById('w-temp').innerText = `${temp > 0 ? '+' : ''}${Math.round(temp)}°`;
                document.getElementById('w-hum').innerText = `${Math.round(hum)}%`;
                document.getElementById('w-wind').innerText = `${dirStr} ${Math.round(windSpeed)}`;
            } catch (e) {
                console.error('Ошибка получения погоды:', e);
                document.getElementById('w-temp').innerText = '-';
                document.getElementById('w-hum').innerText = '-';
                document.getElementById('w-wind').innerText = '-';
            }
        }

        // --- Динамическая дата ---
        function updateDate() {
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            let dateStr = new Date().toLocaleDateString('ru-RU', options).replace(' г.', '');
            let parts = dateStr.split(' ');
            if(parts.length >= 2) parts[1] = parts[1].charAt(0).toUpperCase() + parts[1].slice(1);
            document.getElementById('current-date').innerText = parts.join(' ');
        }

        // --- 5. Графики (Chart.js) ---
        function initCharts() {
            Chart.defaults.color = 'rgba(235, 235, 245, 0.6)';
            Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, sans-serif';

            // Today Mini Chart
            const ctxToday = document.getElementById('todayChart').getContext('2d');
            new Chart(ctxToday, {
                type: 'line',
                data: {
                    labels: db.charts.today.labels,
                    datasets: db.charts.today.datasets.map(ds => ({
                        label: ds.label,
                        data: ds.data,
                        borderColor: ds.color,
                        backgroundColor: ds.color + '33', // 20% opacity
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointRadius: 0
                    }))
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: true }
                    },
                    interaction: { mode: 'index', intersect: false }
                }
            });

            // Archive Comparison Chart
            const ctxArchive = document.getElementById('archiveChart').getContext('2d');
            new Chart(ctxArchive, {
                type: 'bar',
                data: {
                    labels: db.charts.archive.labels,
                    datasets: db.charts.archive.datasets.map(ds => ({
                        label: ds.label,
                        data: ds.data,
                        backgroundColor: ds.color,
                        borderRadius: 4
                    }))
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { 
                            position: 'top',
                            labels: { usePointStyle: true, boxWidth: 8 }
                        } 
                    },
                    scales: {
                        x: { grid: { display: false } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' } }
                    }
                }
            });
        }

        // --- 6. Кнопка "Сохранить" ---
        function downloadApp() {
            const htmlContent = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
            
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `pollen_moscow_${new Date().getTime()}.html`;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // Visual feedback (обновлено для поддержки режима иконки)
            const btnText = document.getElementById('dl-text');
            const btnIcon = document.getElementById('dl-icon');
            
            if (btnText) btnText.innerText = 'Сохранено';
            if (btnIcon) btnIcon.setAttribute('data-lucide', 'check');
            lucide.createIcons();
            
            setTimeout(() => {
                if (btnText) btnText.innerText = 'Сохранить 앱';
                if (btnIcon) btnIcon.setAttribute('data-lucide', 'download');
                lucide.createIcons();
            }, 2000);
        }
    </script>
</body>
</html>
